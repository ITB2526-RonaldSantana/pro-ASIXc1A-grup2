<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Vista frontal del CPD InnovateTech — 3 racks</title>
<desc>Vista frontal dels tres racks del CPD amb tots els components: servidors, xarxa, emmagatzematge, SAIs, CRAC i seguretat</desc>
<defs>
