<text x="140" y="536" text-anchor="middle" dominant-baseline="central" fill="#185fa5" font-family="sans-serif" font-size="12">5 instàncies</text>
<text x="140" y="552" text-anchor="middle" dominant-baseline="central" fill="#185fa5" font-family="sans-serif" font-size="12">t3.small / t3.medium</text>
