<text x="420" y="536" text-anchor="middle" dominant-baseline="central" fill="#185fa5" font-family="sans-serif" font-size="12">Backups offsite</text>
<text x="420" y="552" text-anchor="middle" dominant-baseline="central" fill="#185fa5" font-family="sans-serif" font-size="12">Còpia 3 (remota)</text>
<!-- VPC -->
<rect x="500" y="498" width="100" height="70" rx="6" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
<text x="550" y="520" text-anchor="middle" dominant-baseline="central" fill="#0c447c" font-family="sans-serif" font-size="14" font-weight="500">VPC</text>
<text x="550" y="536" text-anchor="middle" dominant-baseline="central" fill="#185fa5" font-family="sans-serif" font-size="12">Subnets pública</text>
<text x="550" y="552" text-anchor="middle" dominant-baseline="central" fill="#185fa5" font-family="sans-serif" font-size="12">i privada</text>
<!-- Peu de pàgina -->
<text x="340" y="648" text-anchor="middle" fill="#3d3d3a" font-family="sans-serif" font-size="12">CPD InnovateTech · VLAN 10 (Servidors) · VLAN 20 (Administració) · VLAN 30 (DMZ)</text>
