<text x="134" y="338" text-anchor="middle" dominant-baseline="central" fill="#712b13" font-family="sans-serif" font-size="13" font-weight="500">Srv 3 — Àudio</text>
<text x="134" y="354" text-anchor="middle" dominant-baseline="central" fill="#993c1d" font-family="sans-serif" font-size="11">Icecast2 streaming</text>
<line x1="134" y1="310" x2="134" y2="322" stroke="#993c1d" stroke-width="1" marker-end="url(#arrow)"/>
