<text x="546" y="284" text-anchor="middle" dominant-baseline="central" fill="#085041" font-family="sans-serif" font-size="13" font-weight="500">Ansible (node gestió)</text>
<text x="546" y="300" text-anchor="middle" dominant-baseline="central" fill="#0f6e56" font-family="sans-serif" font-size="11">Gestió configuració</text>
<line x1="546" y1="258" x2="546" y2="268" stroke="#0f6e56" stroke-width="1" marker-end="url(#arrow)"/>
<!-- SSH admin -->
<rect x="464" y="322" width="164" height="42" rx="6" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text x="546" y="338" text-anchor="middle" dominant-baseline="central" fill="#085041" font-family="sans-serif" font-size="13" font-weight="500">SSH admin</text>
<text x="546" y="354" text-anchor="middle" dominant-baseline="central" fill="#0f6e56" font-family="sans-serif" font-size="11">Clau pública/privada</text>
<line x1="546" y1="310" x2="546" y2="322" stroke="#0f6e56" stroke-width="1" marker-end="url(#arrow)"/>
<!-- KVM sobre IP -->
<rect x="464" y="376" width="164" height="42" rx="6" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text x="546" y="392" text-anchor="middle" dominant-baseline="central" fill="#085041" font-family="sans-serif" font-size="13" font-weight="500">KVM sobre IP</text>
<text x="546" y="408" text-anchor="middle" dominant-baseline="central" fill="#0f6e56" font-family="sans-serif" font-size="11">ATEN CS1316 (consola)</text>
<line x1="546" y1="364" x2="546" y2="376" stroke="#0f6e56" stroke-width="1" marker-end="url(#arrow)"/>
<!-- Línia cap a AWS -->
<line x1="340" y1="418" x2="340" y2="450" stroke="#378ADD" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<!-- AWS VPC -->
