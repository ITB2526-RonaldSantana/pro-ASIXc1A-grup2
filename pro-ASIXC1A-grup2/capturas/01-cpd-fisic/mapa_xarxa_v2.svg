<text x="280" y="520" text-anchor="middle" dominant-baseline="central" fill="#0c447c" font-family="sans-serif" font-size="14" font-weight="500">Security Groups</text>
<text x="280" y="536" text-anchor="middle" dominant-baseline="central" fill="#185fa5" font-family="sans-serif" font-size="12">Ports 22, 80, 443</text>
<text x="280" y="552" text-anchor="middle" dominant-baseline="central" fill="#185fa5" font-family="sans-serif" font-size="12">514, 9000, 3306</text>
<!-- S3 -->
<rect x="360" y="498" width="120" height="70" rx="6" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
