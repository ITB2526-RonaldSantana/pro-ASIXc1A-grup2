<text x="134" y="408" text-anchor="middle" dominant-baseline="central" fill="#993c1d" font-family="sans-serif" font-size="11">NGINX-RTMP + HLS</text>
<line x1="134" y1="364" x2="134" y2="376" stroke="#993c1d" stroke-width="1" marker-end="url(#arrow)"/>
<!-- ═══ VLAN 10 SERVIDORS ═══ -->
<rect x="258" y="228" width="164" height="30" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
<text x="340" y="244" text-anchor="middle" dominant-baseline="central" fill="#3c3489" font-family="sans-serif" font-size="14" font-weight="500">VLAN 10 — Servidors</text>
