<svg width="100%" viewBox="0 0 680 660" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Mapa de xarxa CPD InnovateTech — 5 servidors</title>
<desc>Diagrama de xarxa amb Internet, Firewall, Switch core, 3 VLANs amb 5 servidors distribuïts i connexió AWS</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<!-- INTERNET -->
<rect x="240" y="20" width="200" height="40" rx="8" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.5"/>
<text x="340" y="36" text-anchor="middle" dominant-baseline="central" fill="#444441" font-family="sans-serif" font-size="14" font-weight="500">Internet</text>
<text x="340" y="52" text-anchor="middle" dominant-baseline="central" fill="#5f5e5a" font-family="sans-serif" font-size="12">ISP / xarxa pública</text>
<line x1="340" y1="60" x2="340" y2="88" stroke="rgba(31,30,29,0.3)" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- FIREWALL -->
<rect x="220" y="88" width="240" height="40" rx="8" fill="#fcebeb" stroke="#a32d2d" stroke-width="0.5"/>
<text x="340" y="104" text-anchor="middle" dominant-baseline="central" fill="#791f1f" font-family="sans-serif" font-size="14" font-weight="500">Firewall perimetral</text>
<text x="340" y="120" text-anchor="middle" dominant-baseline="central" fill="#a32d2d" font-family="sans-serif" font-size="12">pfSense / OPNsense</text>
<line x1="340" y1="128" x2="340" y2="156" stroke="rgba(31,30,29,0.3)" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- SWITCH CORE -->
<rect x="220" y="156" width="240" height="40" rx="8" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.5"/>
<text x="340" y="172" text-anchor="middle" dominant-baseline="central" fill="#444441" font-family="sans-serif" font-size="14" font-weight="500">Switch core</text>
<text x="340" y="188" text-anchor="middle" dominant-baseline="central" fill="#5f5e5a" font-family="sans-serif" font-size="12">Cisco Catalyst 1000-24T-4G-L</text>
<!-- Línies cap a les 3 VLANs -->
<path d="M270 196 L134 228" stroke="rgba(31,30,29,0.3)" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<path d="M340 196 L340 228" stroke="rgba(31,30,29,0.3)" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<path d="M410 196 L546 228" stroke="rgba(31,30,29,0.3)" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<!-- ═══ VLAN 30 DMZ ═══ -->
<rect x="52" y="228" width="164" height="30" rx="8" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
<text x="134" y="244" text-anchor="middle" dominant-baseline="central" fill="#712b13" font-family="sans-serif" font-size="14" font-weight="500">VLAN 30 — DMZ</text>
<!-- Srv 1: Web -->
<rect x="52" y="268" width="164" height="42" rx="6" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
<text x="134" y="284" text-anchor="middle" dominant-baseline="central" fill="#712b13" font-family="sans-serif" font-size="13" font-weight="500">Srv 1 — Web</text>
<text x="134" y="300" text-anchor="middle" dominant-baseline="central" fill="#993c1d" font-family="sans-serif" font-size="11">Nginx + PHP-FPM</text>
<line x1="134" y1="258" x2="134" y2="268" stroke="#993c1d" stroke-width="1" marker-end="url(#arrow)"/>
<!-- Srv 3: Àudio -->
