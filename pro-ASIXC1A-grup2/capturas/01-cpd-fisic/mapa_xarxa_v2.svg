<rect x="258" y="268" width="164" height="42" rx="6" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
<text x="340" y="284" text-anchor="middle" dominant-baseline="central" fill="#3c3489" font-family="sans-serif" font-size="13" font-weight="500">Srv 2 — LDAP+SFTP</text>
<text x="340" y="300" text-anchor="middle" dominant-baseline="central" fill="#534ab7" font-family="sans-serif" font-size="11">OpenLDAP + OpenSSH</text>
<line x1="340" y1="258" x2="340" y2="268" stroke="#534ab7" stroke-width="1" marker-end="url(#arrow)"/>
<!-- Srv 5: BD -->
<rect x="258" y="322" width="164" height="42" rx="6" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
<text x="340" y="338" text-anchor="middle" dominant-baseline="central" fill="#3c3489" font-family="sans-serif" font-size="13" font-weight="500">Srv 5 — Base de dades</text>
<text x="340" y="354" text-anchor="middle" dominant-baseline="central" fill="#534ab7" font-family="sans-serif" font-size="11">MariaDB 10.5</text>
<line x1="340" y1="310" x2="340" y2="322" stroke="#534ab7" stroke-width="1" marker-end="url(#arrow)"/>
<!-- Graylog (logs) -->
<rect x="258" y="376" width="164" height="42" rx="6" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
<text x="340" y="392" text-anchor="middle" dominant-baseline="central" fill="#3c3489" font-family="sans-serif" font-size="13" font-weight="500">Logs — Graylog</text>
<text x="340" y="408" text-anchor="middle" dominant-baseline="central" fill="#534ab7" font-family="sans-serif" font-size="11">Graylog + OpenSearch</text>
<line x1="340" y1="364" x2="340" y2="376" stroke="#534ab7" stroke-width="1" marker-end="url(#arrow)"/>
<!-- ═══ VLAN 20 ADMINISTRACIÓ ═══ -->
<rect x="464" y="228" width="164" height="30" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text x="546" y="244" text-anchor="middle" dominant-baseline="central" fill="#085041" font-family="sans-serif" font-size="14" font-weight="500">VLAN 20 — Admin</text>
<!-- Ansible -->
